include colors/colors.conf

font_family      "JetBrainsMono Nerd Font Mono"
font_size        11

disable_ligatures no
enable_audio_bell no

shell zsh
shell_integration enable

cursor_shape beam

url_style curly

remember_window_size no
#initial_window_width 640
#initial_window_height 400
initial_window_width 78c
initial_window_height 23c
window_padding_width 28
cursor_blink_interval 0

background_opacity 0.80
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0
confirm_os_windows_close 0

## Performance settings
sync_to_monitor on

## Performance
repaint_delay 8
input_delay  3

cursor_trail  3