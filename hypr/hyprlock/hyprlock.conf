$CITY           = Dhaka
$COUNTRY        = Bangladesh
$WALLPAPER_PATH = ~/.config/hypr/hyprlock/wallpaper

background {
    path = $WALLPAPER_PATH
    blur_passes = 2
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.1679
    vibrancy_darkness = 0.0
}

# Genaral
general {
    no_fade_in = fales
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD
input-field {
    monitor =
    size = 200, 35
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(250, 250, 250, 0.3)
    inner_color = rgba(250, 250, 250, 0.2)
    font_color = rgb(250, 250, 250)
    fade_on_empty = false
    font_family = SF Pro Text bold
    placeholder_text = Enter password
    fail_text = $PAMFAIL
    hide_input = false
    position = 0, -260
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 50
    font_family = SF Pro Display Bold
    position = 0, 200
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    font_family = SF Pro Display Semibold
    position = 0, 150
    halign = center
    valign = center
}

# Profile Photo
image {
    monitor =
    path = ~/.config/hypr/hyprlock/image/PFP.jpg
    color = rgba(250, 250, 250, 1.0)
    border_size = 2
    size = 100
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -120
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hello, $USER
    color = rgba(250, 250, 250, 1.0)
    font_size = 20
    font_family = SF Pro Text semibold
    position = 0, -200
    halign = center
    valign = center
}

