general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2

    col.active_border = $blue
    col.inactive_border = $bg4

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 4


    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 10
        render_power = 2
        color = rgba(0a0a0add)
    }

    blur {
        enabled = yes
        size = 5
        passes = 3
        ignore_opacity = true

        noise =  0.08
        contrast = 1
        brightness = 0.8
        #vibrancy = 0.1696
        
        xray = false
        new_optimizations = true

        #dim_inactive = false
        #inactive_opacity = 0.8 
    }
}


